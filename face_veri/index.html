<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NAIF — Face System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c10;color:#cdd6f4;font-family:'Segoe UI',system-ui,sans-serif;
     min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}

h1{font-size:2.2rem;letter-spacing:6px;color:#89dceb;margin-bottom:4px}
.sub{color:#45475a;font-size:.8rem;letter-spacing:3px;margin-bottom:28px}

/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px}
.tab{padding:9px 26px;border-radius:999px;border:1px solid #313244;
     background:none;color:#6c7086;cursor:pointer;font-size:.9rem;transition:.2s}
.tab.active{border-color:#89dceb;color:#89dceb;background:#89dceb12}

/* PANELS */
.panel{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:680px}
.panel.active{display:flex}

/* VIDEO */
.video-wrap{width:100%;border-radius:14px;overflow:hidden;border:1px solid #1e1e2e;
             background:#0a0a0f;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.video-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.video-placeholder{color:#313244;font-size:.85rem;letter-spacing:2px}

/* INPUT */
input[type=text]{width:100%;padding:12px 16px;background:#11111b;border:1px solid #313244;
                  border-radius:10px;color:#cdd6f4;font-size:1rem;outline:none;transition:.2s}
input[type=text]:focus{border-color:#89dceb}

/* BUTTONS */
.btn-row{display:flex;gap:10px;width:100%}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:.95rem;
     font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-blue{background:#89dceb;color:#1e1e2e}
.btn-green{background:#a6e3a1;color:#1e1e2e}
.btn-red{background:#f38ba8;color:#1e1e2e}
.btn-yellow{background:#f9e2af;color:#1e1e2e}

/* PROGRESS */
.prog-wrap{width:100%;height:8px;background:#1e1e2e;border-radius:99px;overflow:hidden}
.prog-bar{height:100%;width:0;background:#89dceb;transition:width .3s;border-radius:99px}

/* STATUS */
.status-box{width:100%;padding:11px 16px;background:#11111b;border-left:3px solid #89dceb;
             border-radius:8px;font-size:.88rem;color:#a6adc8;min-height:42px;transition:.3s}
.status-box.ok{border-color:#a6e3a1;color:#a6e3a1}
.status-box.err{border-color:#f38ba8;color:#f38ba8}

/* DETECTED NAMES */
.detected{width:100%;padding:14px 18px;background:#0d1f1a;
          border:1px solid #a6e3a130;border-radius:10px;display:none}
.detected .dlabel{font-size:.7rem;color:#a6e3a1;letter-spacing:2px;margin-bottom:6px}
.detected .dnames{font-size:1.15rem;color:#cdd6f4;font-weight:700}

/* KNOWN LIST */
.known{width:100%;background:#11111b;border:1px solid #1e1e2e;border-radius:10px;padding:14px 18px}
.known .klabel{font-size:.7rem;color:#89dceb;letter-spacing:2px;margin-bottom:8px}
.chip{display:inline-block;background:#89dceb14;border:1px solid #89dceb40;
      border-radius:99px;padding:3px 12px;margin:3px;font-size:.82rem;color:#89dceb}
.empty{color:#313244;font-size:.85rem}
</style>
</head>
<body>

<h1>NAIF</h1>
<div class="sub">NEURAL AUTONOMOUS INTELLIGENCE FRAMEWORK — FACE SYSTEM</div>

<div class="tabs">
  <button class="tab active" id="tab-reg"   onclick="switchTab('register')">Register Person</button>
  <button class="tab"        id="tab-rec"   onclick="switchTab('recognize')">Live Recognition</button>
</div>

<!-- ══════════ REGISTER PANEL ══════════ -->
<div class="panel active" id="panel-register">

  <div class="video-wrap">
    <img id="regFeed" src="/video_feed" alt="Camera feed"
         onerror="this.style.display='none'" />
  </div>

  <input type="text" id="nameInput" placeholder="Enter your full name…" />

  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>

  <div class="status-box" id="regStatus">Enter your name and click Start Capture.</div>

  <div class="btn-row">
    <button class="btn btn-blue"   id="btnCapture"  onclick="startCapture()">▶ Start Capture</button>
    <button class="btn btn-red"    id="btnStopReg"  onclick="stopAction()" disabled>■ Stop</button>
  </div>
</div>

<!-- ══════════ RECOGNIZE PANEL ══════════ -->
<div class="panel" id="panel-recognize">

  <div class="video-wrap">
    <img id="recFeed" src="" alt="Recognition feed"
         style="display:none" onerror="this.style.display='none'" />
    <span class="video-placeholder" id="recPlaceholder">Click Start Recognition</span>
  </div>

  <div class="detected" id="detectedBox">
    <div class="dlabel">NAIF SEES</div>
    <div class="dnames" id="detectedNames">—</div>
  </div>

  <div class="status-box" id="recStatus">Ready.</div>

  <div class="btn-row">
    <button class="btn btn-blue"  id="btnStartRec" onclick="startRecognition()">▶ Start Recognition</button>
    <button class="btn btn-red"   id="btnStopRec"  onclick="stopRecognition()" disabled>■ Stop</button>
  </div>

  <div class="known" id="knownBox">
    <div class="klabel">REGISTERED PERSONS IN DATABASE</div>
    <div id="knownList"><span class="empty">Loading…</span></div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────
let pollInterval = null;
let currentTab = 'register';

// ── Tab switch ─────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + (tab === 'register' ? 'reg' : 'rec')).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');

  if (tab === 'recognize') {
    document.getElementById('recFeed').src = '/video_feed';
    document.getElementById('recFeed').style.display = 'block';
    document.getElementById('recPlaceholder').style.display = 'none';
  }
}

// ── Poll /status every 800ms ────────────────────────────
function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(pollStatus, 800);
}

function stopPolling() {
  clearInterval(pollInterval);
  pollInterval = null;
}

async function pollStatus() {
  try {
    const res = await fetch('/status');
    const d = await res.json();

    // ── Register tab updates ──
    if (currentTab === 'register') {
      const pct = d.register_target > 0
        ? (d.register_count / d.register_target) * 100 : 0;
      document.getElementById('progBar').style.width = pct + '%';

      if (d.mode === 'register') {
        setStatus('regStatus', `Capturing... ${d.register_count}/${d.register_target}`);
        document.getElementById('btnCapture').disabled = true;
        document.getElementById('btnStopReg').disabled = false;
      } else if (d.register_done && d.mode === 'idle') {
        setStatus('regStatus', d.status, 'ok');
        document.getElementById('btnCapture').disabled = false;
        document.getElementById('btnStopReg').disabled = true;
      } else {
        setStatus('regStatus', d.status);
        document.getElementById('btnCapture').disabled = false;
        document.getElementById('btnStopReg').disabled = true;
      }
    }

    // ── Recognize tab updates ──
    if (currentTab === 'recognize') {
      if (d.mode === 'recognize') {
        setStatus('recStatus', d.status, 'ok');
        document.getElementById('btnStartRec').disabled = true;
        document.getElementById('btnStopRec').disabled = false;

        const box = document.getElementById('detectedBox');
        const names = document.getElementById('detectedNames');
        if (d.detected_persons && d.detected_persons.length > 0) {
          box.style.display = 'block';
          names.textContent = d.detected_persons.join('   •   ');
        } else {
          box.style.display = 'block';
          names.textContent = 'No known face in frame';
        }
      } else {
        setStatus('recStatus', d.status);
        document.getElementById('btnStartRec').disabled = false;
        document.getElementById('btnStopRec').disabled = true;
      }

      // Known people list
      const kl = document.getElementById('knownList');
      if (d.known_people && d.known_people.length > 0) {
        kl.innerHTML = d.known_people.map(n => `<span class="chip">${n}</span>`).join('');
      } else {
        kl.innerHTML = '<span class="empty">No one registered yet.</span>';
      }
    }

  } catch(e) {
    // server might not be ready yet
  }
}

// ── Register ────────────────────────────────────────────
async function startCapture() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    setStatus('regStatus', 'Please enter your name first.', 'err');
    return;
  }
  const res = await fetch('/start_register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const d = await res.json();
  if (d.ok) {
    setStatus('regStatus', d.message);
    document.getElementById('btnCapture').disabled = true;
    document.getElementById('btnStopReg').disabled = false;
    startPolling();
  } else {
    setStatus('regStatus', d.message, 'err');
  }
}

// ── Recognize ───────────────────────────────────────────
async function startRecognition() {
  const res = await fetch('/start_recognize', {method: 'POST'});
  const d = await res.json();
  setStatus('recStatus', d.message, d.ok ? '' : 'err');
  if (d.ok) {
    document.getElementById('btnStartRec').disabled = true;
    document.getElementById('btnStopRec').disabled = false;
    startPolling();
  }
}

async function stopRecognition() {
  await fetch('/stop_action', {method: 'POST'});
  document.getElementById('btnStartRec').disabled = false;
  document.getElementById('btnStopRec').disabled = true;
  document.getElementById('detectedBox').style.display = 'none';
  setStatus('recStatus', 'Stopped.');
}

// ── Stop register ────────────────────────────────────────
async function stopAction() {
  await fetch('/stop_action', {method: 'POST'});
  document.getElementById('btnCapture').disabled = false;
  document.getElementById('btnStopReg').disabled = true;
  setStatus('regStatus', 'Stopped.');
}

// ── Helpers ──────────────────────────────────────────────
function setStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status-box' + (type ? ' ' + type : '');
}

// Start polling immediately
startPolling();
</script>
</body>
</html>
